<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ver Meu Carro — Acompanhe seu Serviço</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta name="theme-color" content="#1a1a1a">
</head>
<body style="padding:0;background:#f5f5f5">

<div class="cliente-wrapper">
  <div class="cliente-header">
    <div class="logo-cliente">Ver Meu <em>Carro</em></div>
    <div class="saudacao">Olá,</div>
    <div class="nome-cliente" id="cli-nome">Carregando...</div>
    <div class="veiculo-info">
      <div class="info-item"><label>Veículo</label><span id="cli-veiculo">—</span></div>
      <div class="info-item"><label>Placa</label><span id="cli-placa">—</span></div>
      <div class="info-item"><label>Ano</label><span id="cli-ano">—</span></div>
      <div class="info-item"><label>Entrada</label><span id="cli-entrada">—</span></div>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot"></div>
    <span id="status-label">Acompanhamento em tempo real</span>
  </div>

  <div class="timeline" id="timeline">
    <div style="text-align:center;padding:40px;color:#aaa">
      <i class="fa fa-spinner fa-spin" style="font-size:28px"></i>
      <p>Carregando acompanhamento...</p>
    </div>
  </div>

  <div id="cli-erro" class="hidden" style="text-align:center;padding:60px 20px">
    <i class="fa fa-exclamation-triangle" style="font-size:48px;color:#dc3545;margin-bottom:16px"></i>
    <h3>Atendimento não encontrado</h3>
    <p style="color:#888;margin-top:8px">Verifique o link recebido.</p>
  </div>
</div>

<footer class="cliente-footer">
  <span>© Ver Meu Carro</span>
  <a id="btn-wpp-footer" class="btn btn-whatsapp btn-sm" target="_blank">
    <i class="fab fa-whatsapp"></i> Falar com a oficina
  </a>
</footer>

<div class="lightbox hidden" id="lightbox" onclick="this.classList.add('hidden')">
  <img id="lightbox-img" src="">
</div>

<script>
const ETAPAS = [
  null,
  { icon: 'fa-flag-checkered', titulo: 'Veículo Recepcionado', msg: nome => `Olá ${nome}! Seu veículo foi recepcionado com sucesso. Em breve você receberá mais atualizações por aqui. Fique tranquilo, seu carro está em boas mãos! 🙌` },
  { icon: 'fa-search', titulo: 'Em Diagnóstico', msg: () => 'Seu veículo acaba de ser encaminhado para a área de diagnóstico. Nosso mecânico especialista está iniciando a análise completa do problema. Aguarde, logo teremos novidades! 🔧' },
  { icon: 'fa-camera', titulo: 'Coletando Evidências do Problema', msg: () => 'Identificamos o problema no seu veículo! Nosso mecânico está registrando as evidências técnicas com fotos e vídeo detalhados para elaborar seu orçamento com total transparência. 📋' },
  { icon: 'fa-file-invoice-dollar', titulo: 'Encaminhado para Orçamentação', msg: () => 'As evidências foram coletadas e seu veículo foi encaminhado para nossa equipe de orçamentação. Em breve você receberá o valor detalhado do serviço. ⏳' },
  { icon: 'fa-envelope-open-text', titulo: 'Orçamento Enviado — Aguardando Aprovação', msg: () => 'Seu orçamento foi elaborado e enviado! Por favor, entre em contato conosco para aprovação e assim que confirmado daremos início imediato ao serviço. ✅' },
  { icon: 'fa-thumbs-up', titulo: 'Orçamento Aprovado', msg: () => 'Ótimo! Orçamento aprovado! Seu veículo já está na fila de serviço e em breve nossos mecânicos darão início ao reparo. Obrigado pela confiança! 💪' },
  { icon: 'fa-cogs', titulo: 'Em Serviço', msg: () => 'Seu veículo está em serviço agora! Nossa equipe está trabalhando com cuidado e dedicação para resolver tudo o mais rápido possível. 🛠️' },
  { icon: 'fa-check-circle', titulo: 'Concluído — Pode Buscar Seu Carro!', msg: nome => `${nome}, o serviço no seu veículo foi concluído com sucesso! Você já pode vir buscar seu carro. Obrigado por confiar em nós! Até a próxima! 🚗💨` }
];

const params = new URLSearchParams(location.search);
const ID = params.get('id');
let whatsappOficina = '5522999999999';
let ultimoStatus = -1;
let carregouUmaVez = false;

function tempoRelativo(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'agora mesmo';
  if (min < 60) return `há ${min} min`;
  const h = Math.floor(min / 60);
  if (h < 24) return `há ${h}h`;
  const d = Math.floor(h / 24);
  return `há ${d} dia${d > 1 ? 's' : ''}`;
}

function fmtData(iso) {
  return new Date(iso).toLocaleDateString('pt-BR');
}

async function carregar() {
  if (!ID) { mostrarErro(); return; }
  try {
    const r = await fetch(`/api/atendimentos/${ID}`);
    if (!r.ok) {
      if (carregouUmaVez) return;
      mostrarErro();
      return;
    }
    const d = await r.json();
    carregouUmaVez = true;
    renderizar(d);
  } catch {
    if (!carregouUmaVez) mostrarErro();
  }
}

function mostrarErro() {
  document.getElementById('cli-erro').classList.remove('hidden');
  document.getElementById('timeline').classList.add('hidden');
}

function renderizar(d) {
  document.title = `${d.nome} — Ver Meu Carro`;
  document.getElementById('cli-nome').textContent = d.nome;
  document.getElementById('cli-veiculo').textContent = d.veiculo;
  document.getElementById('cli-placa').textContent = d.placa;
  document.getElementById('cli-ano').textContent = d.ano;
  document.getElementById('cli-entrada').textContent = fmtData(d.criado_em);

  const statusAtual = parseInt(d.status_atual);
  const concluido = statusAtual === 8;

  document.getElementById('status-label').textContent = concluido
    ? 'Serviço Concluído ✅'
    : `Etapa ${statusAtual} de 8 — ${ETAPAS[statusAtual]?.titulo || ''}`;

  document.getElementById('btn-wpp-footer').href = `https://wa.me/${whatsappOficina}?text=${encodeURIComponent(`Olá! Sou ${d.nome}, gostaria de saber mais sobre o serviço do meu veículo ${d.veiculo} (${d.placa}).`)}`;

  document.getElementById('cli-erro').classList.add('hidden');
  document.getElementById('timeline').classList.remove('hidden');

  const tl = document.getElementById('timeline');
  let html = '';
  for (let i = 1; i <= 8; i++) {
    const e = ETAPAS[i];
    const hist = d.historico.find(h => h.etapa === i);
    const midias = d.midias.filter(m => m.etapa === i);

    let classe = 'futura';
    if (i < statusAtual) classe = 'concluida';
    if (i === statusAtual) classe = concluido ? 'concluida' : 'atual';

    let iconeHtml = `<i class="fa ${e.icon}"></i>`;
    if (classe === 'concluida') iconeHtml = `<i class="fa fa-check"></i>`;
    let badgeAgora = (classe === 'atual') ? `<span class="badge-agora">AGORA</span>` : '';
    if (concluido && i === 8) badgeAgora = `<span class="badge-agora" style="background:var(--verde)">CONCLUÍDO</span>`;

    let obsHtml = '';
    if (hist?.observacao && (classe === 'concluida' || classe === 'atual')) {
      obsHtml = `<div class="tl-obs"><strong><i class="fa fa-comment-alt"></i> Observação da oficina</strong>${hist.observacao}</div>`;
    }
    let tempoHtml = '';
    if (hist?.criado_em && (classe === 'concluida' || classe === 'atual')) {
      tempoHtml = `<div class="tl-tempo"><i class="fa fa-clock"></i> ${tempoRelativo(hist.criado_em)}</div>`;
    }
    let galeriaHtml = '';
    const fotos = midias.filter(m => m.tipo === 'foto');
    const videos = midias.filter(m => m.tipo === 'video');
    if (fotos.length > 0 && (classe === 'concluida' || classe === 'atual')) {
      galeriaHtml += `<div class="galeria">`;
      fotos.forEach(f => { galeriaHtml += `<img src="/uploads/${d.id}/${f.filename}" alt="Foto" onclick="abrirFoto(this.src)">`; });
      galeriaHtml += `</div>`;
    }
    if (videos.length > 0 && (classe === 'concluida' || classe === 'atual')) {
      videos.forEach(v => {
        galeriaHtml += `<div class="video-player"><p><i class="fa fa-video"></i> 🎥 Vídeo do diagnóstico — veja o que encontramos no seu veículo</p><video controls playsinline><source src="/uploads/${d.id}/${v.filename}"></video></div>`;
      });
    }
    const msg = (classe !== 'futura') ? `<div class="tl-msg">${e.msg(d.nome)}</div>` : `<div class="tl-msg">${e.titulo}</div>`;
    html += `
      <div class="timeline-item ${classe}">
        <div class="tl-line"></div>
        <div class="tl-icon-wrap">${iconeHtml}</div>
        <div class="tl-content">
          <div class="tl-title"><span>${i}. ${e.titulo}</span>${badgeAgora}</div>
          ${msg}${obsHtml}${galeriaHtml}${tempoHtml}
        </div>
      </div>`;
  }
  tl.innerHTML = html;

  if (ultimoStatus !== -1 && statusAtual !== ultimoStatus) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('Ver Meu Carro', { body: `Seu veículo avançou para: ${ETAPAS[statusAtual]?.titulo}` });
    }
  }
  ultimoStatus = statusAtual;
}

function abrirFoto(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.remove('hidden');
}

async function init() {
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    whatsappOficina = cfg.whatsapp;
  } catch {}
  await carregar();
  setInterval(carregar, 30000);
  if ('Notification' in window) Notification.requestPermission();
}

init();
</script>
</body>
</html>
