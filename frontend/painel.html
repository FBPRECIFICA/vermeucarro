<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ver Meu Carro — Painel da Oficina</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>

<div id="tela-login">
  <div class="login-card">
    <div class="logo-login">Ver Meu <em>Carro</em></div>
    <p>Painel interno da oficina</p>
    <input type="password" id="input-senha" placeholder="••••••••" maxlength="30">
    <button class="btn btn-vermelho" onclick="fazerLogin()">
      <i class="fa fa-lock"></i> Entrar
    </button>
    <p class="login-erro hidden" id="login-erro">Senha incorreta. Tente novamente.</p>
  </div>
</div>

<div id="tela-painel" class="hidden">
  <header class="painel-header">
    <div class="logo">
      <i class="fa fa-car" style="color:var(--vermelho);font-size:22px"></i>
      <span>Ver Meu <em>Carro</em></span>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <span id="contador-ativos" style="font-size:13px;color:#aaa"></span>
      <button class="btn btn-outline btn-sm" onclick="logout()">
        <i class="fa fa-sign-out-alt"></i> Sair
      </button>
    </div>
  </header>

  <main class="painel-main">
    <div class="abas">
      <button class="aba-btn ativa" onclick="mudarAba('cadastro', this)">
        <i class="fa fa-plus-circle"></i> Novo Atendimento
      </button>
      <button class="aba-btn" onclick="mudarAba('ativos', this)">
        <i class="fa fa-car"></i> Ativos <span id="badge-ativos"></span>
      </button>
      <button class="aba-btn" onclick="mudarAba('historico', this)">
        <i class="fa fa-history"></i> Historico
      </button>
    </div>

    <div id="aba-cadastro">
      <div class="card">
        <h2 style="margin-bottom:20px;font-size:18px"><i class="fa fa-user-plus" style="color:var(--vermelho)"></i> Cadastrar Novo Atendimento</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>Nome do Cliente *</label>
            <input type="text" id="f-nome" placeholder="Ex: Joao Silva">
          </div>
          <div class="form-group">
            <label>WhatsApp (com DDD) *</label>
            <input type="tel" id="f-tel" placeholder="(22) 99999-9999">
          </div>
          <div class="form-group">
